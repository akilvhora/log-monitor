version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: logmonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin@123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logmonitor"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${IMAGE_API:-192.168.1.111:8081/log-monitor-api:latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD_ENCODED:-admin%40123}@postgres:5432/logmonitor
      PORT: 3001
      API_KEY_SECRET: ${API_KEY_SECRET:-change-me-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-3-5-sonnet-20241022}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-30}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  web:
    image: ${IMAGE_WEB:-192.168.1.111:8081/log-monitor-web:latest}
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
